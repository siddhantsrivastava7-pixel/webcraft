<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebCraft AI — Free Website Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060a;--bg2:#0d0d14;--bg3:#13131e;--bg4:#1a1a28;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#f4f2ee;--text2:#a09e9a;--text3:#636070;
  --accent:#7c6cfc;--accent2:#9d91fd;--accent-glow:rgba(124,108,252,0.2);
  --success:#34d399;--r:12px;--r2:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:32px 16px 60px;position:relative;overflow-x:hidden;min-height:100vh}

.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(110px);opacity:0.13}
.orb1{width:500px;height:500px;background:#7c6cfc;top:-150px;left:-80px}
.orb2{width:400px;height:400px;background:#4f46e5;bottom:-100px;right:-80px}
.orb3{width:300px;height:300px;background:#7c3aed;top:45%;left:45%}

.page{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:24px}

header{width:100%;max-width:640px;display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.wordmark{display:flex;align-items:baseline}
.wm1{font-family:'Fraunces',serif;font-size:22px;font-weight:300;color:var(--text)}
.wm2{font-family:'Fraunces',serif;font-size:22px;font-weight:400;color:var(--accent2)}
.top-badge{font-size:9px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);border:1px solid var(--border2);padding:4px 10px;border-radius:20px}

.steps-nav{display:flex;align-items:center}
.step-item{display:flex;align-items:center;gap:8px}
.step-dot{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text3);transition:all 0.3s}
.step-dot.active{border-color:var(--accent);color:var(--accent);background:rgba(124,108,252,0.1);box-shadow:0 0 18px var(--accent-glow)}
.step-dot.done{border-color:var(--success);background:rgba(52,211,153,0.1);color:var(--success)}
.step-lbl{font-size:12px;color:var(--text3);transition:color 0.3s}
.step-lbl.active{color:var(--text2)}
.step-lbl.done{color:var(--success)}
.step-line{width:44px;height:1px;background:var(--border2);margin:0 4px;transition:background 0.3s}
.step-line.done{background:var(--success)}

.main-card{width:100%;max-width:640px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.card-hd{padding:32px 36px 26px;border-bottom:1px solid var(--border)}
.eyebrow{font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}
.card-hd h1{font-family:'Fraunces',serif;font-size:30px;font-weight:300;line-height:1.2;letter-spacing:-0.5px}
.card-hd h1 em{font-style:italic;color:var(--accent2)}
.card-hd p{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;font-weight:300}
.card-bd{padding:30px 36px}

.sec-title{font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.form-sec{margin-bottom:28px}

.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:500;color:var(--text3);margin-bottom:5px;letter-spacing:0.06em;text-transform:uppercase}
.field input,.field textarea,.field select{
  width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);
  padding:11px 14px;font-size:13px;color:var(--text2);font-weight:300;
  font-family:'DM Sans',sans-serif;outline:none;transition:all 0.2s;
  -webkit-appearance:none;appearance:none;
}
.field input::placeholder,.field textarea::placeholder{color:var(--text3)}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--accent);background:var(--bg4);
  box-shadow:0 0 0 3px var(--accent-glow);color:var(--text);
}
.field textarea{min-height:80px;resize:vertical;line-height:1.6}
.field select option{background:var(--bg3)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.styles-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sc{border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;background:var(--bg3);cursor:pointer;position:relative;transition:all 0.2s}
.sc:hover{border-color:rgba(124,108,252,0.4)}
.sc.active{border-color:var(--accent);box-shadow:0 0 22px var(--accent-glow)}
.sp{height:70px;padding:10px 10px 6px;display:flex;flex-direction:column;gap:4px}
.sn{font-size:10px;font-weight:500;color:var(--text3);padding:7px 8px;border-top:1px solid var(--border);text-align:center;letter-spacing:0.04em;transition:color 0.2s}
.sc.active .sn{color:var(--accent2)}
.ck{position:absolute;top:6px;right:6px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;opacity:0;transition:opacity 0.2s}
.sc.active .ck{opacity:1}

.btn-build{
  width:100%;margin-top:24px;padding:16px;border-radius:var(--r);
  background:var(--accent);color:#fff;border:none;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:10px;
  letter-spacing:0.01em;cursor:pointer;transition:all 0.2s;
}
.btn-build:hover{background:#8f81fd;box-shadow:0 0 30px var(--accent-glow)}

.generating{text-align:center;padding:20px 0 10px}
.spinner{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.generating p{font-size:13px;color:var(--text3);font-weight:300}
.gen-dots{display:flex;gap:8px;justify-content:center;margin-top:20px}
.gen-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);animation:dpulse 1.3s ease-in-out infinite}
.gen-dot:nth-child(2){animation-delay:0.2s}
.gen-dot:nth-child(3){animation-delay:0.4s}
@keyframes dpulse{0%,100%{background:var(--border2)}50%{background:var(--accent)}}

.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:var(--r2);padding:12px 16px;font-size:13px;color:#fca5a5;margin-top:16px;line-height:1.5}

.preview-wrap{width:100%;max-width:900px}
.preview-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.preview-hd h2{font-family:'Fraunces',serif;font-size:24px;font-weight:300}
.preview-hd h2 em{font-style:italic;color:var(--accent2)}
.preview-actions{display:flex;gap:10px;flex-wrap:wrap}
.pbtn{padding:9px 18px;border-radius:var(--r2);border:1px solid var(--border2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:all 0.15s;color:var(--text2);background:var(--bg2)}
.pbtn:hover{background:var(--bg3);color:var(--text)}
.pbtn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.pbtn.accent:hover{background:#8f81fd}
.pbtn.teal{background:#0d9488;color:#fff;border-color:#0d9488}
.pbtn.teal:hover{background:#0f766e}
.browser{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.browser-bar{background:var(--bg3);padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.browser-dots{display:flex;gap:6px}
.browser-dots span{width:10px;height:10px;border-radius:50%;background:var(--border2)}
.url-pill{flex:1;background:var(--bg2);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text3);border:1px solid var(--border)}
#preview-frame{width:100%;height:600px;border:none;background:#fff;display:block}
.preview-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:12px;font-weight:300}
.preview-hint strong{color:var(--accent2)}

.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.overlay{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 40px;max-width:480px;width:100%;position:relative}
.overlay h3{font-family:'Fraunces',serif;font-size:26px;font-weight:300;margin-bottom:6px}
.overlay h3 em{font-style:italic;color:var(--accent2)}
.overlay .sub{font-size:13px;color:var(--text3);margin-bottom:28px;line-height:1.6;font-weight:300}
.ov-steps{list-style:none;display:flex;flex-direction:column;gap:16px;margin-bottom:28px}
.ov-steps li{display:flex;align-items:flex-start;gap:14px}
.ov-num{width:28px;height:28px;min-width:28px;border-radius:50%;background:rgba(124,108,252,0.12);border:1px solid rgba(124,108,252,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--accent2)}
.ov-text strong{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.ov-text span{font-size:12px;color:var(--text3);line-height:1.5;font-weight:300}
.ov-btn{width:100%;padding:15px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-bottom:10px}
.ov-btn:hover{background:#8f81fd;box-shadow:0 0 30px var(--accent-glow)}
.ov-tip{background:rgba(255,255,255,0.03);border-radius:var(--r2);padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.6;font-weight:300}
.ov-tip strong{color:var(--accent2)}
.ov-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;line-height:1}
.ov-close:hover{color:var(--text)}

@media(max-width:520px){
  .card-hd,.card-bd{padding:24px 20px}
  .card-hd h1{font-size:22px}
  .two{grid-template-columns:1fr}
  .styles-grid{grid-template-columns:repeat(2,1fr)}
  .overlay{padding:24px 20px}
  .preview-actions{gap:8px}
  .pbtn{padding:8px 12px;font-size:12px}
}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="page">
  <header>
    <div class="wordmark">
      <span class="wm1">Web</span><span class="wm2">Craft</span>
    </div>
    <div class="top-badge">AI Website Builder</div>
  </header>

  <div class="steps-nav">
    <div class="step-item">
      <div class="step-dot active" id="dot-1">1</div>
      <span class="step-lbl active" id="lbl-1">Your Business</span>
    </div>
    <div class="step-line" id="line-1"></div>
    <div class="step-item">
      <div class="step-dot" id="dot-2">2</div>
      <span class="step-lbl" id="lbl-2">Generating</span>
    </div>
    <div class="step-line" id="line-2"></div>
    <div class="step-item">
      <div class="step-dot" id="dot-3">3</div>
      <span class="step-lbl" id="lbl-3">Your Site</span>
    </div>
  </div>

  <div class="main-card" id="main-card"></div>
</div>

<div id="overlay-container"></div>

<script>
const STYLES = [
  {
    id:'modern', name:'Modern',
    preview:`<div style="height:6px;background:linear-gradient(90deg,#1e293b,#0f172a);border-radius:2px"></div><div style="height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:3px;margin-top:4px"></div><div style="display:flex;gap:3px;margin-top:4px"><div style="height:12px;flex:1;background:#e2e8f0;border-radius:2px"></div><div style="height:12px;flex:1;background:#e2e8f0;border-radius:2px"></div><div style="height:12px;flex:1;background:#e2e8f0;border-radius:2px"></div></div>`,
    hint:'sleek modern design, indigo and purple gradients, dark sticky nav, crisp white card sections, bold sans-serif headings'
  },
  {
    id:'warm', name:'Warm',
    preview:`<div style="height:6px;background:#7c2d12;border-radius:2px"></div><div style="height:28px;background:linear-gradient(135deg,#f97316,#fb923c);border-radius:3px;margin-top:4px"></div><div style="display:flex;gap:3px;margin-top:4px"><div style="height:12px;flex:1;background:#fff7ed;border-radius:2px"></div><div style="height:12px;flex:1;background:#fff7ed;border-radius:2px"></div><div style="height:12px;flex:1;background:#fff7ed;border-radius:2px"></div></div>`,
    hint:'warm inviting design, orange and amber color palette, earthy tones, cream/off-white backgrounds, rounded friendly shapes'
  },
  {
    id:'elegant', name:'Elegant',
    preview:`<div style="height:6px;background:#0f0f0f;border-radius:2px"></div><div style="height:28px;background:#1a1a1a;border-radius:3px;margin-top:4px;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,160,76,0.55),transparent)"></div></div><div style="display:flex;gap:3px;margin-top:4px"><div style="height:12px;flex:1;background:#f5f0e8;border-radius:2px"></div><div style="height:12px;flex:1;background:#f5f0e8;border-radius:2px"></div><div style="height:12px;flex:1;background:#f5f0e8;border-radius:2px"></div></div>`,
    hint:'elegant luxury design, dark charcoal and black backgrounds, gold and champagne accents, serif typography, premium high-end feel'
  },
  {
    id:'fresh', name:'Fresh',
    preview:`<div style="height:6px;background:#14532d;border-radius:2px"></div><div style="height:28px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:3px;margin-top:4px"></div><div style="display:flex;gap:3px;margin-top:4px"><div style="height:12px;flex:1;background:#f0fdf4;border-radius:2px"></div><div style="height:12px;flex:1;background:#f0fdf4;border-radius:2px"></div><div style="height:12px;flex:1;background:#f0fdf4;border-radius:2px"></div></div>`,
    hint:'fresh natural design, green and teal color palette, light airy white backgrounds, organic friendly feel, rounded cards'
  },
];

const BUSINESS_TYPES = [
  'Restaurant / Café','Retail Store / Shop','Salon / Spa / Beauty',
  'Fitness / Gym / Wellness','Professional Services (Lawyer, Accountant, Consultant)',
  'Healthcare / Medical','Real Estate','Photography / Creative Studio',
  'Construction / Home Services','Education / Tutoring','Tech / Software','Other',
];

let state = { step:'form', selectedStyle:'modern', formData:{}, generatedHTML:'', showOverlay:false };

function setStep(n) {
  [1,2,3].forEach(i => {
    const dot = document.getElementById('dot-'+i);
    const lbl = document.getElementById('lbl-'+i);
    if(i < n) {
      dot.className='step-dot done'; dot.textContent='✓'; lbl.className='step-lbl done';
    } else if(i===n) {
      dot.className='step-dot active'; dot.textContent=i; lbl.className='step-lbl active';
    } else {
      dot.className='step-dot'; dot.textContent=i; lbl.className='step-lbl';
    }
    if(i<3) document.getElementById('line-'+i).className='step-line'+(i<n?' done':'');
  });
}

function render() {
  const card = document.getElementById('main-card');
  if(state.step==='form') { card.innerHTML=renderForm(); bindForm(); setStep(1); }
  else if(state.step==='generating') { card.innerHTML=renderGenerating(); setStep(2); }
  else if(state.step==='preview') {
    card.style.display='none';
    const existing = document.getElementById('preview-wrap');
    if(existing) existing.remove();
    document.querySelector('.page').insertAdjacentHTML('beforeend', renderPreview());
    bindPreview(); setStep(3); setTimeout(loadPreview, 100);
  }
  renderOverlay();
}

function renderForm() {
  const opts = BUSINESS_TYPES.map(t => `<option value="${t}" ${state.formData.type===t?'selected':''}>${t}</option>`).join('');
  const cards = STYLES.map(s => `
    <div class="sc ${s.id===state.selectedStyle?'active':''}" data-style="${s.id}">
      <div class="ck">✓</div>
      <div class="sp">${s.preview}</div>
      <div class="sn">${s.name}</div>
    </div>`).join('');
  return `
    <div class="card-hd">
      <div class="eyebrow">Get started</div>
      <h1>Build your <em>website</em><br>in 60 seconds</h1>
      <p>No coding, no designers, no waiting. Just tell us about your business.</p>
    </div>
    <div class="card-bd">
      <div class="form-sec">
        <div class="sec-title">Your business</div>
        <div class="field"><label>Business name *</label>
          <input type="text" id="f-name" placeholder="e.g. The Golden Fork, Maya's Salon..." value="${state.formData.name||''}">
        </div>
        <div class="field"><label>Type of business *</label>
          <select id="f-type"><option value="">Select a category...</option>${opts}</select>
        </div>
        <div class="field"><label>Describe what you do *</label>
          <textarea id="f-desc" placeholder="e.g. We serve authentic home-style Indian food in a warm family setting. We also cater for weddings...">${state.formData.description||''}</textarea>
        </div>
      </div>
      <div class="form-sec">
        <div class="sec-title">Contact details</div>
        <div class="two">
          <div class="field"><label>Phone / WhatsApp</label>
            <input type="text" id="f-phone" placeholder="+91 98000 00000" value="${state.formData.phone||''}">
          </div>
          <div class="field"><label>City / Location</label>
            <input type="text" id="f-location" placeholder="e.g. Mumbai, Delhi..." value="${state.formData.location||''}">
          </div>
        </div>
        <div class="two">
          <div class="field"><label>Email</label>
            <input type="text" id="f-email" placeholder="hello@mybusiness.com" value="${state.formData.email||''}">
          </div>
          <div class="field"><label>Opening hours</label>
            <input type="text" id="f-hours" placeholder="Mon–Sat, 9am–8pm" value="${state.formData.hours||''}">
          </div>
        </div>
      </div>
      <div class="form-sec">
        <div class="sec-title">Pick a style</div>
        <div class="styles-grid">${cards}</div>
      </div>
      <div id="error-msg"></div>
      <button class="btn-build" id="build-btn">
        <span>Build My Website</span>
        <span style="font-size:17px">→</span>
      </button>
    </div>`;
}

function bindForm() {
  document.querySelectorAll('.sc').forEach(el => {
    el.addEventListener('click', () => {
      state.selectedStyle = el.dataset.style;
      document.querySelectorAll('.sc').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
    });
  });
  document.getElementById('build-btn').addEventListener('click', async () => {
    const name = document.getElementById('f-name').value.trim();
    const type = document.getElementById('f-type').value;
    const description = document.getElementById('f-desc').value.trim();
    if(!name || !type || !description) {
      document.getElementById('error-msg').innerHTML =
        `<div class="error-box">Please fill in your business name, type, and description to continue.</div>`;
      return;
    }
    state.formData = {
      name, type, description,
      phone: document.getElementById('f-phone').value.trim(),
      location: document.getElementById('f-location').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      hours: document.getElementById('f-hours').value.trim(),
      style: state.selectedStyle,
    };
    state.step = 'generating'; render(); await generateWebsite();
  });
}

function renderGenerating() {
  return `
    <div class="card-hd" style="border-bottom:none">
      <div class="eyebrow">Please wait</div>
      <h1>Crafting <em>${(state.formData.name||'your website').replace(/</g,'&lt;')}</em>...</h1>
      <p>AI is designing your site — this takes about 20 seconds</p>
    </div>
    <div class="card-bd">
      <div class="generating">
        <div class="spinner"></div>
        <p>Designing layouts, writing copy, choosing fonts...</p>
        <div class="gen-dots"><div class="gen-dot"></div><div class="gen-dot"></div><div class="gen-dot"></div></div>
      </div>
    </div>`;
}

function renderPreview() {
  const slug = (state.formData.name||'mybusiness').toLowerCase().replace(/[^a-z0-9]/g,'');
  return `
    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-hd">
        <h2>Your <em>website</em> is ready</h2>
        <div class="preview-actions">
          <button class="pbtn" id="edit-btn">← Edit</button>
          <button class="pbtn accent" id="dl-btn">↓ Download HTML</button>
          <button class="pbtn teal" id="live-btn">🌐 Go Live — Free</button>
        </div>
      </div>
      <div class="browser">
        <div class="browser-bar">
          <div class="browser-dots"><span></span><span></span><span></span></div>
          <div class="url-pill">www.${slug}.com</div>
        </div>
        <iframe id="preview-frame" referrerpolicy="no-referrer-when-downgrade" ></iframe>
      </div>
      <p class="preview-hint">Click <strong>Go Live</strong> to publish free in under 2 minutes — no account needed.</p>
    </div>`;
}

function bindPreview() {
  document.getElementById('edit-btn').onclick = () => {
    document.getElementById('preview-wrap').remove();
    document.getElementById('main-card').style.display='';
    state.step='form'; render();
  };
  document.getElementById('dl-btn').onclick = downloadHTML;
  document.getElementById('live-btn').onclick = () => { downloadHTML(); setTimeout(()=>{ state.showOverlay=true; renderOverlay(); }, 400); };
}

function loadPreview() {
  const f = document.getElementById('preview-frame');
  if(f && state.generatedHTML) f.srcdoc = state.generatedHTML;
}

function downloadHTML() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([state.generatedHTML],{type:'text/html'}));
  a.download = (state.formData.name||'my-website').toLowerCase().replace(/\s+/g,'-')+'.html';
  a.click();
}

function renderOverlay() {
  const el = document.getElementById('overlay-container');
  if(!state.showOverlay) { el.innerHTML=''; return; }
  el.innerHTML=`
    <div class="overlay-bg" id="ov-bg">
      <div class="overlay">
        <button class="ov-close" id="ov-close">✕</button>
        <h3>Make it <em>live</em></h3>
        <p class="sub">Free hosting, no account needed, done in 2 minutes.</p>
        <ol class="ov-steps">
          <li><div class="ov-num">1</div><div class="ov-text"><strong>File downloaded</strong><span>Check your Downloads folder — your HTML file is ready.</span></div></li>
          <li><div class="ov-num">2</div><div class="ov-text"><strong>Open Netlify Drop</strong><span>Click below to open <strong style="color:var(--text2)">netlify.com/drop</strong> in a new tab.</span></div></li>
          <li><div class="ov-num">3</div><div class="ov-text"><strong>Drag & drop your file</strong><span>Drop the HTML file. You'll get a public link like <strong style="color:var(--text2)">yoursite.netlify.app</strong> instantly.</span></div></li>
        </ol>
        <button class="ov-btn" id="netlify-btn">Open Netlify Drop →</button>
        <div class="ov-tip"><strong>Want yourbusiness.com?</strong> Create a free Netlify account and connect any domain for ~₹800/year.</div>
      </div>
    </div>`;
  document.getElementById('ov-close').onclick = ()=>{ state.showOverlay=false; renderOverlay(); };
  document.getElementById('ov-bg').onclick = e=>{ if(e.target.id==='ov-bg'){ state.showOverlay=false; renderOverlay(); } };
  document.getElementById('netlify-btn').onclick = ()=> window.open('https://app.netlify.com/drop','_blank');
}

async function generateWebsite() {
  const styleHint = STYLES.find(s=>s.id===state.formData.style)?.hint || '';
  try {
    const res = await fetch('/api/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({...state.formData, styleHint}),
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Generation failed. Please try again.');
    let html = data.html || '';
    // Strip markdown code fences if Gemini wrapped the output
    html = html.replace(/^```html\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/, '').trim();
    // Extract just the HTML if there's preamble text before it
    const doctypeIdx = html.indexOf('<!DOCTYPE');
    const htmlTagIdx = html.indexOf('<html');
    const startIdx = doctypeIdx >= 0 ? doctypeIdx : htmlTagIdx;
    if(startIdx > 0) html = html.slice(startIdx);
    if(startIdx < 0) throw new Error('Invalid response from AI. Please try again.');
    state.generatedHTML = html;
    state.step = 'preview'; render();
  } catch(err) {
    state.step='form'; render();
    const eb = document.getElementById('error-msg');
    if(eb) eb.innerHTML=`<div class="error-box">${err.message}</div>`;
  }
}

render();
</script>
</body>
</html>
